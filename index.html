<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nico | Portfolio</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>
<body>

    <!-- NAVIGATION -->
    <nav>
        <h2 class="logo">Nico.</h2>

        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#skills">Skills</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>

        <button id="darkModeBtn">
            <i class="fa-solid fa-moon"></i>
        </button>
    </nav>

    <!-- HERO -->
    <section class="hero" id="home">

        <div class="hero-text" data-aos="fade-right">
            <h1>Hello, I'm Nico</h1>

            <h2>
                I'm a <span class="typing"></span>
            </h2>

            <p>
                Passionate about building modern responsive websites and systems.
            </p>

            <div class="hero-buttons">
                <a href="#projects" class="btn">View Projects</a>

                <a href="cv.pdf" download class="btn secondary-btn">
                    Download CV
                </a>
            </div>
        </div>

        <div class="hero-image" data-aos="fade-left">
            <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43b?q=80&w=1200&auto=format&fit=crop" alt="Profile">
        </div>

    </section>

    <!-- SKILLS -->
    <section class="skills" id="skills">

        <h2 data-aos="fade-up">Skills</h2>

        <div class="skills-container">

            <div class="skill-card" data-aos="zoom-in">
                <i class="fa-brands fa-html5"></i>
                <h3>HTML</h3>
            </div>

            <div class="skill-card" data-aos="zoom-in">
                <i class="fa-brands fa-css3-alt"></i>
                <h3>CSS</h3>
            </div>

            <div class="skill-card" data-aos="zoom-in">
                <i class="fa-brands fa-js"></i>
                <h3>JavaScript</h3>
            </div>
</html>
